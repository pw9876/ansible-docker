schemaVersion: "2.0.0"

commandTests:
  - name: "ansible version"
    command: "ansible"
    args: ["--version"]
    expectedOutput:
      - "ansible \\[core"
    exitCode: 0

  - name: "ansible-playbook version"
    command: "ansible-playbook"
    args: ["--version"]
    exitCode: 0

  - name: "ansible-galaxy version"
    command: "ansible-galaxy"
    args: ["--version"]
    exitCode: 0

  - name: "git is available"
    command: "git"
    args: ["--version"]
    expectedOutput:
      - "git version"
    exitCode: 0

  - name: "bash is available"
    command: "bash"
    args: ["--version"]
    expectedOutput:
      - "GNU bash"
    exitCode: 0

  - name: "python3 is available"
    command: "python3"
    args: ["--version"]
    expectedOutput:
      - "Python 3"
    exitCode: 0

fileExistenceTests:
  - name: "ansible binary present"
    path: "/usr/bin/ansible"
    shouldExist: true

  - name: "workspace directory exists"
    path: "/workspace"
    shouldExist: true

metadataTest:
  workdir: "/workspace"
  entrypoint: ["ansible"]
  user: "ansible"
